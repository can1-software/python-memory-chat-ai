services:
  postgres:
    image: postgres:16
    container_name: memory_chat_ai_db
    restart: always
    environment:
      POSTGRES_DB: memory_chat_ai
      POSTGRES_USER: memory_user
      POSTGRES_PASSWORD: memory_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: